name: Docker

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
  workflow_dispatch:
    inputs:
      grepai_version:
        description: "grepai version to build (tag or branch)"
        required: false
        default: "main"

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/greite/grepai-docker

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t grepai-test .

      - name: Test - binary runs
        run: docker run --rm --entrypoint /grepai grepai-test version

      - name: Test - image size < 50MB
        run: |
          SIZE=$(docker image inspect grepai-test --format='{{.Size}}')
          echo "Image size: $((SIZE / 1024 / 1024))MB"
          [ "$SIZE" -lt 52428800 ] || (echo "Image too large!" && exit 1)

  build-and-push:
    needs: [test]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve grepai version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.grepai_version }}" ]; then
            echo "grepai_version=${{ github.event.inputs.grepai_version }}" >> "$GITHUB_OUTPUT"
          else
            # Always fetch latest release tag from upstream
            LATEST=$(curl -sL https://api.github.com/repos/yoanbernabeu/grepai/releases/latest | jq -r .tag_name)
            echo "grepai_version=${LATEST}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=schedule,pattern=nightly
            type=raw,value=${{ steps.version.outputs.grepai_version }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          build-args: GREPAI_VERSION=${{ steps.version.outputs.grepai_version }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
