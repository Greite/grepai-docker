services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: grepai-postgres
    environment:
      POSTGRES_USER: grepai
      POSTGRES_PASSWORD: grepai
      POSTGRES_DB: grepai
    ports:
      - "5432:5432"
    volumes:
      - grepai-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grepai"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - postgres

  qdrant:
    image: qdrant/qdrant:latest
    container_name: grepai-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - grepai-qdrant:/qdrant/storage
    profiles:
      - qdrant

  grepai:
    image: ghcr.io/greite/grepai-docker:latest
    # build: .  # Uncomment to build locally
    volumes:
      - ./:/workspace  # Must contain .grepai/config.yaml
    profiles:
      - watch

volumes:
  grepai-pgdata:
  grepai-qdrant:
